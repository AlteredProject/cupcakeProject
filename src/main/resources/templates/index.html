<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <link rel="stylesheet" href="/public/css/main.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script th:src="@{/js/functions.js}" defer></script>

</head>
<body>
    <header class="header">
        <div>
            <img class="logo" th:src="@{/images/companyLogo2.png}">
        </div>
        <div>
            <img class="cupcakes" th:src="@{/images/cupcakelogo.png}">
        </div>
        <div></div>
    </header>


    <div class="navbar">
        <a>Ordrer</a>
        <a>Kunder</a>
        <span>bertramfriis1@gmail.com</span>
        <span>Credit: 10000</span>
        <img th:src="@{/images/basket.png}">
    </div>

    <div class="main-body">
        <h1 class="welcome-heading">Velkommen ombord</h1>
        <p class="welcome-sub">Øens bedste cupcakes</p>

        <div class="order-form">
            <p>Topping:</p>
            <select id="topping">
                <option value="" disabled selected>Vælg</option>
                <option th:each="entry : ${Toppings}"
                        th:value="${entry.price}"
                        th:text="${entry.name + ' - ' + entry.price} + '$'"></option>
            </select>

            <p>Bund:</p>
            <select id="bottom">
                <option value="0" disabled selected>Vælg</option>
                <option th:each="entry : ${Bottoms}"
                        th:value="${entry.price}"
                        th:text="${entry.name + ' - ' + entry.price} + '$'"></option>
            </select>

            <p>Mængde</p>
            <select id="amount">
                <option value="0" disabled selected>Vælg</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select>

            <p id="totalPrice">Samlet pris: 0 $</p>

            <button class="btn">Læg i Kurv</button>
        </div>
    </div>

</body>
</html>
