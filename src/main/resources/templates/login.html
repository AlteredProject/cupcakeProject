<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olsker Cupcakes - Login</title>
    <link rel="stylesheet" href="/public/css/main.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script th:src="@{/js/functions.js}" defer></script>
</head>
<body>
<header class="header">
    <div>
        <a href="/">
            <img class="logo" th:src="@{/images/companyLogo2.png}">
        </a>
    </div>
    <div>
        <img class="cupcakes" th:src="@{/images/cupcakelogo.png}">
    </div>
    <div></div>
</header>


<div class="navbar">
    <p>
        <a href="/createUser">Opret bruger</a>
    </p>
    <p th:unless="${session.currentUser}">
        <a href="/login">Login</a>
    </p>
    <img th:src="@{/images/basket.png}">
</div>

<div class="main-body">
    <h1 class="welcome-heading">Login</h1>
    <form method="post" action="/login">
        Email <input type="text" name="email">
        Password <input type="password" name="password">
        <button type="submit" class="switchBtn">Login</button>
    </form>
    <p th:text="${msg}"></p>
</div>

</body>
</html>
